# Streaming IterableDataset: batch ridotto per VRAM (seq 512); accum compensa (eff ~256).
batch_size: 32
gradient_accumulation_steps: 8
learning_rate: 2.5e-4
weight_decay: 0.01
warmup_steps: 800
max_steps: 1400000
max_seq_len: 512
save_every: 2000
eval_every: 2000
eval_batches: 20
seed: 42
use_fp16: true
gradient_clip: 1.0
perf_log_every: 20
perf_ema_alpha: 0.1

data_train: data/processed/train.jsonl
data_val: data/processed/val.jsonl
tokenizer_dir: models/tokenizer
checkpoint_dir: models/checkpoints
