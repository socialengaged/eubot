# batch/accum/num_workers: tuned for GPU throughput (DataLoader workers + AMP in train.py)
batch_size: 128
gradient_accumulation_steps: 2
num_workers: 8
learning_rate: 2.5e-4
weight_decay: 0.01
warmup_steps: 800
max_steps: 1400000
max_seq_len: 512
save_every: 2000
eval_every: 2000
eval_batches: 20
seed: 42
use_fp16: true
gradient_clip: 1.0

data_train: data/processed/train.jsonl
data_val: data/processed/val.jsonl
tokenizer_dir: models/tokenizer
checkpoint_dir: models/checkpoints
