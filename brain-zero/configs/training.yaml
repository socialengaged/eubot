# Training hyperparameters (tune per GPU memory)

batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 3.0e-4
weight_decay: 0.01
warmup_steps: 100
max_steps: 5000
max_seq_len: 512
save_every: 1000
eval_every: 500
eval_batches: 20
seed: 42
use_fp16: true
gradient_clip: 1.0

# Paths (relative to brain-zero/)
data_train: data/processed/train.jsonl
data_val: data/processed/val.jsonl
tokenizer_dir: models/tokenizer
checkpoint_dir: models/checkpoints
