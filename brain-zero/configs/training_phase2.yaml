# Phase 2: small model (~125M), longer training on WikiText + OpenWebText
# Designed for 16 GB+ GPU. If OOM, reduce batch_size to 2.

batch_size: 4
gradient_accumulation_steps: 8       # effective batch = 32
learning_rate: 6.0e-4
weight_decay: 0.1
warmup_steps: 500
max_steps: 50000
max_seq_len: 1024
save_every: 5000
eval_every: 1000
eval_batches: 40
seed: 42
use_fp16: true
gradient_clip: 1.0

# Paths (relative to brain-zero/)
data_train: data/processed/train.jsonl
data_val: data/processed/val.jsonl
tokenizer_dir: models/tokenizer
checkpoint_dir: models/checkpoints
