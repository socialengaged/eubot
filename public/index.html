<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eubot</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">Eubot</h1>
        <p class="subtitle">Local AI · Mistral via Ollama</p>
      </header>

      <main class="chat" id="chat" aria-live="polite"></main>

      <div class="loading hidden" id="loading" aria-hidden="true">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>

      <form class="composer" id="form" autocomplete="off">
        <label class="sr-only" for="input">Message</label>
        <input
          id="input"
          class="input"
          type="text"
          placeholder="Type a message…"
          maxlength="4000"
          required
        />
        <button type="submit" class="send" id="send">Send</button>
      </form>
    </div>
    <script src="/js/app.js" type="module"></script>
  </body>
</html>
